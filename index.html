<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashCard – Hiệu Chuẩn & Quan Trắc</title>

<style>
  :root {
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #085041;
    --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #26215C;
    --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #042C53;
    --amber: #BA7517; --amber-light: #FAEEDA; --amber-dark: #412402;
    --coral: #D85A30; --coral-light: #FAECE7; --coral-dark: #4A1B0C;
    --bg: #F7F5F0;
    --card-bg: #FFFFFF;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: rgba(0,0,0,0.08);
    --radius: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(29,158,117,0.08) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(127,119,221,0.08) 0%, transparent 50%);
  }

  /* ── Header ── */
  header {
    padding: 2rem 2rem 0;
    display: flex; align-items: flex-end; justify-content: space-between;
    max-width: 760px; margin: 0 auto;
  }
  .logo-block h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 2rem; line-height: 1.1;
    color: var(--text);
  }
  .logo-block p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  .stats-header {
    display: flex; gap: 10px; align-items: center;
  }
  .stat-pill {
    font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px;
  }
  .stat-know { background: var(--teal-light); color: var(--teal-dark); }
  .stat-again { background: var(--coral-light); color: var(--coral-dark); }

  /* ── Main layout ── */
  main {
    max-width: 760px; margin: 0 auto;
    padding: 1.5rem 2rem 3rem;
  }

  /* ── Category tabs ── */
  .cat-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 4px; margin-bottom: 1.5rem;
    scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    white-space: nowrap; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 6px 16px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    cursor: pointer; transition: all 0.2s;
  }
  .cat-btn:hover { border-color: var(--teal); color: var(--teal); }
  .cat-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* ── Progress ── */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 5px; background: rgba(0,0,0,0.06);
    border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--teal);
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Flashcard ── */
  .card-stage {
    perspective: 1200px;
    height: 260px;
    cursor: pointer;
    margin-bottom: 1rem;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    box-shadow: var(--shadow);
  }
  .card-front { background: var(--card-bg); }
  .card-back { transform: rotateY(180deg); }

  .card-cat-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 4px 12px;
    border-radius: 20px; margin-bottom: 16px;
    position: absolute; top: 20px; left: 20px;
  }
  .card-num {
    position: absolute; top: 20px; right: 20px;
    font-size: 12px; color: var(--text-muted);
  }
  .card-word {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 2.2rem; text-align: center;
    color: var(--text); line-height: 1.2; margin-bottom: 8px;
  }
  .card-phonetic { font-size: 14px; color: var(--text-muted); }
  .card-flip-hint {
    position: absolute; bottom: 18px;
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }
  .card-vn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 1.9rem; text-align: center;
    line-height: 1.25; margin-bottom: 12px;
  }
  .card-ex {
    font-size: 13px; text-align: center;
    line-height: 1.6; font-style: italic;
    opacity: 0.75; max-width: 360px;
  }

  /* ── Action buttons ── */
  .action-row {
    display: flex; gap: 12px; justify-content: center;
    margin-bottom: 1.5rem;
    opacity: 0; pointer-events: none;
    transform: translateY(8px);
    transition: all 0.25s;
  }
  .action-row.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
  .action-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 11px 28px; border-radius: 12px;
    border: 1.5px solid; cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 7px;
  }
  .btn-again {
    background: var(--coral-light); color: var(--coral-dark);
    border-color: rgba(216,90,48,0.3);
  }
  .btn-again:hover { background: #f5c4b3; }
  .btn-know {
    background: var(--teal-light); color: var(--teal-dark);
    border-color: rgba(29,158,117,0.3);
  }
  .btn-know:hover { background: #9FE1CB; }

  .flip-btn-wrap {
    display: flex; justify-content: center; margin-bottom: 1rem;
    transition: opacity 0.2s;
  }
  .flip-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 14px; font-weight: 500; color: var(--text-muted);
    background: var(--card-bg); border: 1.5px solid var(--border);
    padding: 9px 24px; border-radius: 10px; cursor: pointer;
    transition: all 0.15s;
  }
  .flip-btn:hover { border-color: var(--teal); color: var(--teal); }

  /* ── Word list panel ── */
  .panel-toggle {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 13px; font-weight: 500;
    background: none; border: 1.5px solid var(--border);
    padding: 7px 16px; border-radius: 10px;
    cursor: pointer; color: var(--text-muted);
    transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    margin: 0 auto 1rem;
  }
  .panel-toggle:hover { border-color: var(--purple); color: var(--purple); }
  .word-list-panel {
    background: var(--card-bg);
    border-radius: var(--radius); border: 1.5px solid var(--border);
    overflow: hidden;
    max-height: 0; transition: max-height 0.4s ease;
  }
  .word-list-panel.open { max-height: 800px; }
  .word-list-inner { padding: 1rem 1.25rem; }
  .word-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .word-row:last-child { border-bottom: none; }
  .word-en { font-weight: 500; color: var(--text); }
  .word-vn { color: var(--text-muted); }
  .word-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
  }
  .word-dot.known { background: var(--teal); }
  .word-dot.again { background: var(--coral); }

  /* ── Done screen ── */
  .done-screen {
    text-align: center; padding: 2.5rem 1rem;
    background: var(--card-bg);
    border-radius: var(--radius); box-shadow: var(--shadow);
  }
  .done-icon { font-size: 56px; margin-bottom: 12px; }
  .done-screen h2 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 1.8rem; margin-bottom: 8px; }
  .done-screen p { color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6; }
  .done-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 10px 24px; border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg); cursor: pointer;
    margin: 4px; transition: all 0.15s;
    color: var(--text);
  }
  .done-btn:hover { background: var(--teal-light); border-color: var(--teal); color: var(--teal-dark); }
  .done-btn.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .done-btn.primary:hover { background: var(--teal-dark); }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    main { padding: 1rem 1rem 2rem; }
    .card-word { font-size: 1.7rem; }
    .card-vn { font-size: 1.5rem; }
    .card-stage { height: 240px; }
  }

  /* ── Animations ── */
  @keyframes pop-in {
    from { opacity:0; transform: scale(0.96) translateY(10px); }
    to { opacity:1; transform: scale(1) translateY(0); }
  }
  .card-stage { animation: pop-in 0.35s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>FlashCard<br><em>Hiệu Chuẩn</em></h1>
    <p>Từ vựng tiếng Anh chuyên ngành đo lường & quan trắc</p>
  </div>
  <div class="stats-header">
    <div class="stat-pill stat-know">✓ <span id="hKnow">0</span> biết</div>
    <div class="stat-pill stat-again">↺ <span id="hAgain">0</span> ôn</div>
  </div>
</header>

<main>
  <div class="cat-scroll" id="catTabs"></div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progLabel">Thẻ 1 / 20</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div id="mainArea"></div>

  <div class="flip-btn-wrap" id="flipBtnWrap">
    <button class="flip-btn" onclick="flipCard()">↕ Xem nghĩa tiếng Việt</button>
  </div>

  <div class="action-row" id="actionRow">
    <button class="action-btn btn-again" onclick="markAgain()">↺ Ôn lại</button>
    <button class="action-btn btn-know" onclick="markKnow()">✓ Đã biết</button>
  </div>

  <button class="panel-toggle" onclick="toggleList()">☰ Xem danh sách tất cả từ</button>
  <div class="word-list-panel" id="wordPanel">
    <div class="word-list-inner" id="wordListInner"></div>
  </div>
</main>

<script>
const vocab = [
  { en:"Calibration", ph:"/ˌkælɪˈbreɪʃən/", vn:"Hiệu chuẩn", ex:"The sensor requires annual calibration.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Accuracy", ph:"/ˈækjərəsi/", vn:"Độ chính xác", ex:"This device has ±0.1% accuracy.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Precision", ph:"/prɪˈsɪʒən/", vn:"Độ tinh xác", ex:"Precision is essential in lab measurements.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Uncertainty", ph:"/ʌnˈsɜːtənti/", vn:"Độ không đảm bảo đo", ex:"Report the measurement uncertainty.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Traceability", ph:"/ˌtreɪsəˈbɪlɪti/", vn:"Liên kết chuẩn", ex:"Traceability to national standards is required.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Tolerance", ph:"/ˈtɒlərəns/", vn:"Dung sai", ex:"The reading is within tolerance.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Deviation", ph:"/ˌdiːviˈeɪʃən/", vn:"Độ lệch", ex:"The deviation is 0.05 units.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Drift", ph:"/drɪft/", vn:"Độ trôi", ex:"Sensor drift occurs over time.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Zero adjustment", ph:"/ˈzɪərəʊ əˈdʒʌstmənt/", vn:"Chỉnh không", ex:"Perform zero adjustment before use.", cat:"Hiệu chuẩn", color:"teal" },
  { en:"Sensor", ph:"/ˈsɛnsər/", vn:"Cảm biến", ex:"Install the temperature sensor first.", cat:"Thiết bị", color:"purple" },
  { en:"Probe", ph:"/proʊb/", vn:"Đầu dò", ex:"Insert the probe into the sample.", cat:"Thiết bị", color:"purple" },
  { en:"Datalogger", ph:"/ˈdeɪtəˌlɒɡər/", vn:"Bộ ghi dữ liệu", ex:"Download data from the datalogger.", cat:"Thiết bị", color:"purple" },
  { en:"Transducer", ph:"/trænsˈdjuːsər/", vn:"Bộ chuyển đổi tín hiệu", ex:"The transducer converts pressure to voltage.", cat:"Thiết bị", color:"purple" },
  { en:"Reference standard", ph:"/ˈrɛfrəns ˈstændərd/", vn:"Chuẩn tham chiếu", ex:"Use the reference standard to verify.", cat:"Thiết bị", color:"purple" },
  { en:"Monitoring station", ph:"/ˈmɒnɪtərɪŋ ˈsteɪʃən/", vn:"Trạm quan trắc", ex:"The monitoring station records hourly data.", cat:"Quan trắc", color:"blue" },
  { en:"Humidity", ph:"/hjuːˈmɪdɪti/", vn:"Độ ẩm", ex:"Humidity is measured in percent.", cat:"Quan trắc", color:"blue" },
  { en:"Barometric pressure", ph:"/ˌbærəˈmɛtrɪk ˈprɛʃər/", vn:"Áp suất khí quyển", ex:"Barometric pressure dropped before the storm.", cat:"Quan trắc", color:"blue" },
  { en:"Precipitation", ph:"/prɪˌsɪpɪˈteɪʃən/", vn:"Lượng mưa", ex:"Record daily precipitation levels.", cat:"Quan trắc", color:"blue" },
  { en:"Calibration certificate", ph:"/ˌkælɪˈbreɪʃən səˈtɪfɪkɪt/", vn:"Giấy chứng nhận hiệu chuẩn", ex:"Keep the calibration certificate on file.", cat:"Tài liệu", color:"amber" },
  { en:"Standard operating procedure", ph:"/ˈstændərd ˈɒpəreɪtɪŋ prəˈsiːdʒər/", vn:"Quy trình chuẩn (SOP)", ex:"Follow the standard operating procedure.", cat:"Tài liệu", color:"amber" },
];

const colors = {
  teal:   { bg:"#E1F5EE", text:"#085041", badge:"#9FE1CB", badgeText:"#04342C" },
  purple: { bg:"#EEEDFE", text:"#26215C", badge:"#CECBF6", badgeText:"#3C3489" },
  blue:   { bg:"#E6F1FB", text:"#042C53", badge:"#B5D4F4", badgeText:"#0C447C" },
  amber:  { bg:"#FAEEDA", text:"#412402", badge:"#FAC775", badgeText:"#633806" },
};
const cats = ["Tất cả","Hiệu chuẩn","Thiết bị","Quan trắc","Tài liệu"];

let activeCat = "Tất cả";
let queue = [], currentIdx = 0, flipped = false;
let knowSet = new Set(), againSet = new Set();
let listOpen = false;

function getQueue() {
  return activeCat === "Tất cả" ? [...vocab] : vocab.filter(v=>v.cat===activeCat);
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

function initQueue() {
  queue = shuffle(getQueue());
  currentIdx = 0; flipped = false;
  knowSet.clear(); againSet.clear();
  updateUI(); renderCard(); renderWordList();
}

function updateUI() {
  document.getElementById("hKnow").textContent = knowSet.size;
  document.getElementById("hAgain").textContent = againSet.size;
  const total = queue.length;
  const done = currentIdx;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById("progLabel").textContent = `Thẻ ${Math.min(done+1,total)} / ${total}`;
  document.getElementById("progPct").textContent = pct + "%";
  document.getElementById("progFill").style.width = pct + "%";
  renderWordList();
}

function renderCard() {
  const area = document.getElementById("mainArea");
  const flipWrap = document.getElementById("flipBtnWrap");
  const actionRow = document.getElementById("actionRow");

  if(currentIdx >= queue.length) {
    flipWrap.style.display = "none";
    actionRow.classList.remove("visible");
    area.innerHTML = `<div class="done-screen">
      <div class="done-icon">🎉</div>
      <h2>Bạn đã hoàn thành!</h2>
      <p>Biết ngay: <strong>${knowSet.size}</strong> từ &nbsp;·&nbsp; Cần ôn thêm: <strong>${againSet.size}</strong> từ</p>
      ${againSet.size>0 ? `<button class="done-btn" onclick="reviewAgain()">↺ Ôn lại ${againSet.size} từ chưa nhớ</button>` : ""}
      <button class="done-btn primary" onclick="initQueue()">▶ Bắt đầu lại từ đầu</button>
    </div>`;
    return;
  }

  const w = queue[currentIdx];
  const c = colors[w.color];
  flipped = false;
  flipWrap.style.display = "flex";
  actionRow.classList.remove("visible");

  area.innerHTML = `<div class="card-stage" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <span class="card-cat-badge" style="background:${c.badge};color:${c.badgeText}">${w.cat}</span>
        <span class="card-num">${currentIdx+1} / ${queue.length}</span>
        <div class="card-word">${w.en}</div>
        <div class="card-phonetic">${w.ph}</div>
        <div class="card-flip-hint">↕ nhấn để lật</div>
      </div>
      <div class="card-face card-back" style="background:${c.bg}">
        <span class="card-cat-badge" style="background:${c.badge};color:${c.badgeText}">${w.cat}</span>
        <span class="card-num">${currentIdx+1} / ${queue.length}</span>
        <div class="card-vn" style="color:${c.text}">${w.vn}</div>
        <div class="card-ex" style="color:${c.text}">"${w.ex}"</div>
        <div class="card-flip-hint">↕ nhấn để lật lại</div>
      </div>
    </div>
  </div>`;
}

function flipCard() {
  if(currentIdx >= queue.length) return;
  flipped = !flipped;
  const ci = document.getElementById("cardInner");
  if(!ci) return;
  ci.classList.toggle("flipped", flipped);
  const ar = document.getElementById("actionRow");
  const fw = document.getElementById("flipBtnWrap");
  if(flipped){ ar.classList.add("visible"); fw.style.opacity="0"; }
  else { ar.classList.remove("visible"); fw.style.opacity="1"; }
}

function markKnow(){ knowSet.add(queue[currentIdx].en); currentIdx++; updateUI(); renderCard(); }
function markAgain(){ againSet.add(queue[currentIdx].en); currentIdx++; updateUI(); renderCard(); }
function reviewAgain(){
  queue = shuffle(vocab.filter(v=>againSet.has(v.en)));
  currentIdx=0; flipped=false; knowSet.clear(); againSet.clear();
  updateUI(); renderCard();
}

function buildCatTabs() {
  const el = document.getElementById("catTabs");
  el.innerHTML = cats.map(c=>`<button class="cat-btn${c===activeCat?' active':''}" onclick="selectCat('${c}')">${c}</button>`).join("");
}
function selectCat(c){ activeCat=c; buildCatTabs(); initQueue(); }

function renderWordList() {
  const container = document.getElementById("wordListInner");
  const list = getQueue();
  container.innerHTML = list.map(w=>{
    const known = knowSet.has(w.en);
    const again = againSet.has(w.en);
    return `<div class="word-row">
      <span class="word-dot${known?' known':again?' again':''}"></span>
      <span class="word-en">${w.en}</span>
      <span class="word-vn">${w.vn}</span>
    </div>`;
  }).join("");
}

function toggleList() {
  listOpen = !listOpen;
  document.getElementById("wordPanel").classList.toggle("open", listOpen);
}

// keyboard shortcuts
document.addEventListener("keydown", e=>{
  if(e.code==="Space"){ e.preventDefault(); flipCard(); }
  if(e.code==="ArrowRight" && flipped) markKnow();
  if(e.code==="ArrowLeft" && flipped) markAgain();
});

buildCatTabs();
initQueue();
</script>
</body>
</html>
