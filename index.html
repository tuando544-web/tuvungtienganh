<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FlashCard">
<meta name="theme-color" content="#1D9E75">
<title>FlashCard – Học Từ Vựng</title>

<!-- PWA Icon inline SVG as data URI -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231D9E75'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E📚%3C/text%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F2F0EC; --card: #FFFFFF; --text: #1C1C1E; --muted: #6B6B6B;
  --border: rgba(0,0,0,0.09);
  --teal: #1D9E75; --teal-l: #E1F5EE; --teal-d: #085041;
  --purple: #7F77DD; --purple-l: #EEEDFE; --purple-d: #3C3489;
  --blue: #378ADD; --blue-l: #E6F1FB; --blue-d: #0C447C;
  --amber: #BA7517; --amber-l: #FAEEDA; --amber-d: #633806;
  --coral: #D85A30; --coral-l: #FAECE7; --coral-d: #993C1D;
  --pink: #D4537E; --pink-l: #FBEAF0; --pink-d: #72243E;
  --green: #639922; --green-l: #EAF3DE; --green-d: #3B6D11;
  --r: 16px;
  --font: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* NAV */
.nav {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-size: 17px; font-weight: 800; }
.nav-logo span { color: var(--teal); }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  font-family: var(--font); font-size: 13px; font-weight: 700;
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
}
.nav-tab.active { background: var(--teal); border-color: var(--teal); color: #fff; }

/* PAGE */
.page { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
.page.active { display: block; }
.sec-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 10px; }

/* INSTALL BANNER */
.install-banner {
  background: linear-gradient(135deg, #1D9E75, #378ADD);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px; color: #fff;
}
.install-banner-icon { font-size: 28px; flex-shrink: 0; }
.install-banner-text { flex: 1; }
.install-banner-text strong { font-size: 14px; font-weight: 800; display: block; }
.install-banner-text small { font-size: 12px; opacity: 0.85; line-height: 1.4; }
.install-close {
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  font-size: 14px; flex-shrink: 0; font-family: var(--font);
}

/* DECK LIST */
.deck-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.deck-card {
  background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
  padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
  box-shadow: var(--shadow); transition: transform 0.15s;
}
.deck-card:active { transform: scale(0.98); }
.deck-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.deck-info { flex: 1; min-width: 0; }
.deck-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-meta { font-size: 12px; color: var(--muted); }
.deck-arrow { color: var(--muted); font-size: 20px; }
.deck-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; font-family: var(--font);
}

/* ADD DECK BTN */
.add-deck-btn {
  width: 100%; padding: 14px; border-radius: var(--r);
  border: 2px dashed var(--border); background: transparent;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.add-deck-btn:hover { border-color: var(--teal); color: var(--teal); }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--card); border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
  width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-family: var(--font); font-size: 15px; color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--teal); }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: transform 0.15s;
}
.color-dot.selected { border-color: var(--text); transform: scale(1.15); }
.modal-btns { display: flex; gap: 10px; margin-top: 8px; }
.btn {
  flex: 1; padding: 14px; border-radius: 14px; font-family: var(--font);
  font-size: 15px; font-weight: 700; cursor: pointer; border: none;
  transition: opacity 0.15s;
}
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--teal); color: #fff; }
.btn-secondary { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
.btn-danger { background: var(--coral-l); color: var(--coral-d); }

/* IMAGE UPLOAD */
.img-upload-area {
  border: 2px dashed var(--border); border-radius: 12px; padding: 16px;
  text-align: center; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
}
.img-upload-area:hover, .img-upload-area:active { border-color: var(--teal); background: var(--teal-l); }
.img-preview {
  width: 100%; max-height: 180px; object-fit: cover;
  border-radius: 8px; display: none;
}
.img-upload-hint { font-size: 13px; color: var(--muted); font-weight: 600; }
.img-upload-hint span { font-size: 28px; display: block; margin-bottom: 6px; }
.img-clear-btn {
  position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
  background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%;
  cursor: pointer; font-size: 14px; display: none; align-items: center; justify-content: center;
  z-index: 2;
}
#imgFile { display: none; }

/* WORD LIST */
.word-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.word-item {
  background: var(--card); border-radius: 12px; border: 1px solid var(--border);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
}
.word-item-thumb {
  width: 46px; height: 46px; border-radius: 10px; flex-shrink: 0;
  background: var(--bg); display: flex; align-items: center;
  justify-content: center; font-size: 22px; overflow: hidden;
}
.word-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.word-item-info { flex: 1; min-width: 0; }
.word-item-en { font-size: 14px; font-weight: 700; }
.word-item-vn { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.empty-state { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 44px; margin-bottom: 10px; }

/* STUDY PAGE */
.study-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.back-btn {
  width: 38px; height: 38px; border-radius: 11px; border: 1.5px solid var(--border);
  background: var(--card); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.study-title { font-size: 16px; font-weight: 800; flex: 1; }
.prog-wrap { margin-bottom: 14px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.prog-track { height: 6px; background: rgba(0,0,0,0.07); border-radius: 10px; }
.prog-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
.score-row { display: flex; gap: 8px; margin-bottom: 14px; }
.score-pill { font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; }

/* FLASHCARD */
.card-stage { perspective: 1000px; height: 270px; cursor: pointer; margin-bottom: 12px; user-select: none; }
.card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; border-radius: 22px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; box-shadow: var(--shadow); overflow: hidden;
}
.card-front { background: var(--card); }
.card-back { transform: rotateY(180deg); }
.card-badge { position: absolute; top: 14px; left: 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
.card-num { position: absolute; top: 14px; right: 14px; font-size: 12px; color: var(--muted); font-weight: 600; }
.card-img { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; margin-bottom: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.13); }
.card-word { font-size: 30px; font-weight: 800; text-align: center; margin-bottom: 6px; line-height: 1.2; }
.card-ph { font-size: 13px; color: var(--muted); text-align: center; }
.card-hint { position: absolute; bottom: 12px; font-size: 11px; color: var(--muted); }
.card-vn { font-size: 23px; font-weight: 800; text-align: center; margin-bottom: 8px; line-height: 1.3; }
.card-ex { font-size: 13px; text-align: center; line-height: 1.55; font-style: italic; opacity: 0.7; }

.flip-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
.flip-btn { font-family: var(--font); font-size: 14px; font-weight: 700; background: var(--card); border: 1.5px solid var(--border); color: var(--muted); padding: 11px 32px; border-radius: 14px; cursor: pointer; }
.action-row { display: flex; gap: 10px; margin-bottom: 16px; opacity: 0; pointer-events: none; transform: translateY(6px); transition: all 0.2s; }
.action-row.vis { opacity: 1; pointer-events: all; transform: translateY(0); }
.act-btn { flex: 1; padding: 14px; border-radius: 14px; font-family: var(--font); font-size: 15px; font-weight: 700; border: none; cursor: pointer; }
.btn-again { background: var(--coral-l); color: var(--coral-d); }
.btn-know { background: var(--teal-l); color: var(--teal-d); }

.done-box { text-align: center; padding: 30px 16px; background: var(--card); border-radius: 22px; box-shadow: var(--shadow); }
.done-box h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.done-box p { color: var(--muted); margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
.done-btns { display: flex; flex-direction: column; gap: 8px; }

@keyframes pop { from { opacity:0; transform:scale(0.95) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
.card-stage { animation: pop 0.3s ease both; }

/* BACKUP BAR */
.backup-bar {
  background: var(--card); border-radius: 16px; border: 1px solid var(--border);
  padding: 14px 16px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.backup-bar-title { font-size: 13px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.backup-btns { display: flex; gap: 8px; }
.backup-btn {
  flex: 1; padding: 11px 8px; border-radius: 12px; font-family: var(--font);
  font-size: 13px; font-weight: 700; cursor: pointer; border: none;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity 0.15s;
}
.backup-btn:active { opacity: 0.7; }
.backup-export { background: var(--teal-l); color: var(--teal-d); }
.backup-import { background: var(--blue-l); color: var(--blue-d); }
.backup-info { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
#importFile { display: none; }

/* TOAST */
.toast {
  position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1C1C1E; color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; z-index: 999;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<div class="nav">
  <div class="nav-logo">Flash<span>Card</span> 📚</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home')">Bộ thẻ</button>
    <button class="nav-tab" onclick="showPage('manage')">Quản lý</button>
  </div>
</div>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div id="installBanner" style="display:none">
    <div class="install-banner">
      <div class="install-banner-icon">📲</div>
      <div class="install-banner-text">
        <strong>Cài app lên màn hình chính!</strong>
        <small id="installHint"></small>
      </div>
      <button class="install-close" onclick="dismissInstall()">✕</button>
    </div>
  </div>
  <div class="sec-title">Chọn bộ thẻ để học</div>
  <div class="deck-list" id="deckListHome"></div>
</div>

<!-- MANAGE PAGE -->
<div class="page" id="page-manage">
  <div class="backup-bar">
    <div class="backup-bar-title">☁️ Sao lưu dữ liệu</div>
    <div class="backup-btns">
      <button class="backup-btn backup-export" onclick="exportBackup()">⬇️ Xuất file backup</button>
      <button class="backup-btn backup-import" onclick="document.getElementById('importFile').click()">⬆️ Nhập file backup</button>
    </div>
    <div class="backup-info" id="backupInfo">Chưa có thông tin backup</div>
    <input type="file" id="importFile" accept=".json" onchange="importBackup(event)">
  </div>
  <div class="sec-title">Bộ thẻ của bạn</div>
  <div class="deck-list" id="deckListManage"></div>
  <button class="add-deck-btn" onclick="openAddDeck()">+ Tạo bộ thẻ mới</button>
</div>

<!-- STUDY PAGE -->
<div class="page" id="page-study">
  <div class="study-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="study-title" id="studyTitle"></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-meta"><span id="progLabel">Thẻ 1/1</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="score-row">
    <div class="score-pill" style="background:var(--teal-l);color:var(--teal-d)">✓ <span id="sKnow">0</span> biết</div>
    <div class="score-pill" style="background:var(--coral-l);color:var(--coral-d)">↺ <span id="sAgain">0</span> ôn</div>
    <div class="score-pill" style="background:var(--bg);color:var(--muted)"><span id="sLeft">0</span> còn</div>
  </div>
  <div id="studyArea"></div>
  <div class="flip-wrap" id="flipWrap">
    <button class="flip-btn" onclick="flipCard()">↕ Nhấn để xem nghĩa</button>
  </div>
  <div class="action-row" id="actionRow">
    <button class="act-btn btn-again" onclick="markAgain()">↺ Ôn lại</button>
    <button class="act-btn btn-know" onclick="markKnow()">✓ Đã biết</button>
  </div>
</div>

<!-- DECK MODAL -->
<div class="overlay" id="deckModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="deckModalTitle">Tạo bộ thẻ mới</div>
    <div class="form-group">
      <label class="form-label">Tên bộ thẻ</label>
      <input class="form-input" id="deckName" placeholder="VD: Từ vựng y tế, Tiếng Anh IT...">
    </div>
    <div class="form-group">
      <label class="form-label">Biểu tượng</label>
      <input class="form-input" id="deckEmoji" placeholder="Nhập emoji VD: 🏥 💻 🌿" maxlength="4">
    </div>
    <div class="form-group">
      <label class="form-label">Màu sắc</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('deckModal')">Huỷ</button>
      <button class="btn btn-primary" onclick="saveDeck()">Lưu</button>
    </div>
  </div>
</div>

<!-- WORD MODAL -->
<div class="overlay" id="wordModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="wordModalTitle">Thêm từ mới</div>
    <div class="form-group">
      <label class="form-label">Từ tiếng Anh *</label>
      <input class="form-input" id="wordEn" placeholder="VD: Calibration">
    </div>
    <div class="form-group">
      <label class="form-label">Phiên âm</label>
      <input class="form-input" id="wordPh" placeholder="VD: /ˌkælɪˈbreɪʃən/">
    </div>
    <div class="form-group">
      <label class="form-label">Nghĩa tiếng Việt *</label>
      <input class="form-input" id="wordVn" placeholder="VD: Hiệu chuẩn">
    </div>
    <div class="form-group">
      <label class="form-label">Câu ví dụ</label>
      <input class="form-input" id="wordEx" placeholder="VD: Annual calibration is required.">
    </div>
    <div class="form-group">
      <label class="form-label">Hình ảnh (tuỳ chọn)</label>
      <div class="img-upload-area" id="imgUploadArea" onclick="document.getElementById('imgFile').click()">
        <img class="img-preview" id="imgPreview" alt="">
        <button class="img-clear-btn" id="imgClearBtn" onclick="event.stopPropagation();clearImage()">✕</button>
        <div class="img-upload-hint" id="imgHint">
          <span>🖼️</span>Chọn ảnh từ thiết bị
        </div>
      </div>
      <input type="file" id="imgFile" accept="image/*" onchange="handleImageUpload(event)">
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('wordModal')">Huỷ</button>
      <button class="btn btn-primary" onclick="saveWord()">Lưu</button>
    </div>
  </div>
</div>

<!-- DECK DETAIL MODAL -->
<div class="overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="modal-title" id="detailTitle" style="margin:0"></div>
      <button class="icon-btn" onclick="openAddWord()" style="font-size:18px;font-weight:800">＋</button>
    </div>
    <div id="detailWordList"></div>
    <div class="modal-btns" style="margin-top:10px">
      <button class="btn btn-danger" onclick="confirmDeleteDeck()">🗑 Xoá bộ thẻ</button>
      <button class="btn btn-secondary" onclick="closeModal('detailModal')">Đóng</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirmTitle">Xác nhận</div>
    <p id="confirmMsg" style="color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.6"></p>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Huỷ</button>
      <button class="btn btn-danger" id="confirmOkBtn">Xoá</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { name:"teal",   bg:"#1D9E75", light:"#E1F5EE", dark:"#085041" },
  { name:"purple", bg:"#7F77DD", light:"#EEEDFE", dark:"#3C3489" },
  { name:"blue",   bg:"#378ADD", light:"#E6F1FB", dark:"#0C447C" },
  { name:"amber",  bg:"#BA7517", light:"#FAEEDA", dark:"#633806" },

// ---- DATA (IndexedDB for large image data, localStorage fallback) ----
const DB_NAME = "flashcardDB", DB_VER = 1, STORE = "appData";

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbGet(key) {
  try {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).get(key);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  } catch(e) { return null; }
}
async function dbSet(key, val) {
  try {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(val, key);
      tx.oncomplete = () => res(true);
      tx.onerror = () => rej(tx.error);
    });
  } catch(e) { return false; }
}

async function loadData() {
  try {
    const d = await dbGet("fcData");
    if (d) return d;
  } catch(e) {}
  // fallback localStorage
  try {
    const s = localStorage.getItem("fcData");
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { decks: [], words: {} };
}
async function saveData(d) {
  await dbSet("fcData", d);
  try { localStorage.setItem("fcData", JSON.stringify(d)); } catch(e) {}
  showToast("✓ Đã lưu");
}

// IMAGE
function handleImageUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  // Resize image before storing
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      currentImageData = canvas.toDataURL("image/jpeg", 0.75);
      document.getElementById("imgPreview").src = currentImageData;
      document.getElementById("imgPreview").style.display = "block";
      document.getElementById("imgHint").style.display = "none";
      document.getElementById("imgClearBtn").style.display = "flex";
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImage() {
  currentImageData = null;
  document.getElementById("imgPreview").style.display = "none";
  document.getElementById("imgHint").style.display = "block";
  document.getElementById("imgClearBtn").style.display = "none";

}

// STUDY
function shuffle(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
async function startStudy(deckId) {
  const d = await loadData();
  const deck = d.decks.find(dk => dk.id === deckId);
  const words = d.words[deckId] || [];
  if (words.length === 0) { alert("Bộ thẻ này chưa có từ nào! Vào Quản lý để thêm từ nhé."); return; }
  activeDeckId = deckId;

  // Load saved progress
  const prog = d.progress && d.progress[deckId];
  if (prog && prog.knowIds && prog.knowIds.length > 0) {
    const resume = confirm(`Bạn đã học ${prog.knowIds.length} từ lần trước.\n\nTiếp tục từ chỗ đã học, hay học lại từ đầu?`);
    if (resume) {
      // Only study words not yet known
      const remaining = words.filter(w => !prog.knowIds.includes(w.id));
      if (remaining.length === 0) {
        if (confirm("Bạn đã biết hết tất cả từ trong bộ này! 🎉\nHọc lại từ đầu không?")) {
          clearProgress(deckId); studyQueue = shuffle([...words]);
        } else return;
      } else {
        studyQueue = shuffle(remaining);
        knowSet = new Set(prog.knowIds);
        againSet = new Set(prog.againIds || []);
      }
    } else {
      clearProgress(deckId);
      studyQueue = shuffle([...words]);
      knowSet.clear(); againSet.clear();
    }
  } else {
    studyQueue = shuffle([...words]);
    knowSet.clear(); againSet.clear();
  }

  studyIdx = 0; flipped = false;
  const c = COLORS.find(c => c.name === deck.color) || COLORS[0];
  document.getElementById("progFill").style.background = c.bg;
  document.getElementById("studyTitle").textContent = deck.emoji+" "+deck.name;
  showPage("study"); updateStudyUI(); renderStudyCard();
}

async function saveProgress() {
  const d = await loadData();
  if (!d.progress) d.progress = {};
  d.progress[activeDeckId] = {
    knowIds: [...knowSet],
    againIds: [...againSet],
    savedAt: new Date().toISOString()
  };
  await saveData(d);
}

async function clearProgress(deckId) {
  const d = await loadData();
  if (d.progress) delete d.progress[deckId];
  await saveData(d);
  knowSet.clear(); againSet.clear();
}
function updateStudyUI() {
  const total = studyQueue.length, done = studyIdx;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById("progLabel").textContent = `Thẻ ${Math.min(done+1,total)} / ${total}`;
  document.getElementById("progPct").textContent = pct+"%";
  document.getElementById("progFill").style.width = pct+"%";
  document.getElementById("sKnow").textContent = knowSet.size;
  document.getElementById("sAgain").textContent = againSet.size;
  document.getElementById("sLeft").textContent = Math.max(0,total-done);
}
async function renderStudyCard() {
  const area = document.getElementById("studyArea");
  const flipW = document.getElementById("flipWrap");
  const actRow = document.getElementById("actionRow");
  if (studyIdx >= studyQueue.length) {
    flipW.style.display = "none"; actRow.classList.remove("vis");
    // If all words known, clear progress
    const d2 = await loadData();
    const allWords = d2.words[activeDeckId] || [];
    const allDone = allWords.every(w => knowSet.has(w.id));
    if (allDone) clearProgress(activeDeckId);
    else saveProgress();
    area.innerHTML = `<div class="done-box">
      <div style="font-size:52px;margin-bottom:12px">🎉</div>
      <h2>Hoàn thành!</h2>
      <p>Đã biết: <strong>${knowSet.size}</strong> từ &nbsp;·&nbsp; Cần ôn: <strong>${againSet.size}</strong> từ</p>
      <div class="done-btns">
        ${againSet.size>0?`<button class="btn btn-danger" onclick="reviewAgain()">↺ Ôn lại ${againSet.size} từ chưa nhớ</button>`:""}
        <button class="btn btn-primary" onclick="startStudy('${activeDeckId}')">▶ Học lại từ đầu</button>
        <button class="btn btn-secondary" onclick="goHome()">← Về trang chủ</button>
      </div>
    </div>`;
    return;
  }
  const w = studyQueue[studyIdx];
  const d = await loadData();
  const deck = d.decks.find(dk => dk.id === activeDeckId) || {};
  const c = COLORS.find(c => c.name === deck.color) || COLORS[0];
  flipped = false;
  flipW.style.display = "flex"; flipW.style.opacity = "1";
  actRow.classList.remove("vis");
  const imgEl = w.img ? `<img class="card-img" src="${w.img}" alt="${w.en}">` : "";
  area.innerHTML = `<div class="card-stage" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <span class="card-badge" style="background:${c.light};color:${c.dark}">${deck.emoji} ${deck.name}</span>
        <span class="card-num">${studyIdx+1}/${studyQueue.length}</span>
        ${imgEl}
        <div class="card-word">${w.en}</div>
        <div class="card-ph">${w.ph||""}</div>
        <div class="card-hint">chạm để lật ↕</div>
      </div>
      <div class="card-face card-back" style="background:${c.light}">
        <span class="card-badge" style="background:${c.bg};color:#fff">${deck.emoji} ${deck.name}</span>
        <span class="card-num">${studyIdx+1}/${studyQueue.length}</span>
        ${imgEl}
        <div class="card-vn" style="color:${c.dark}">${w.vn}</div>
        ${w.ex?`<div class="card-ex" style="color:${c.dark}">"${w.ex}"</div>`:""}
        <div class="card-hint">chạm để lật lại ↕</div>
      </div>
    </div>
  </div>`;
}
function flipCard() {
  if (studyIdx >= studyQueue.length) return;
  flipped = !flipped;
  const ci = document.getElementById("cardInner"); if (!ci) return;
  ci.classList.toggle("flipped", flipped);
  const ar = document.getElementById("actionRow"), fw = document.getElementById("flipWrap");
  if (flipped) { ar.classList.add("vis"); fw.style.opacity="0"; }
  else { ar.classList.remove("vis"); fw.style.opacity="1"; }
}
function markKnow()  { knowSet.add(studyQueue[studyIdx].id);  studyIdx++; updateStudyUI(); renderStudyCard(); saveProgress(); }
function markAgain() { againSet.add(studyQueue[studyIdx].id); studyIdx++; updateStudyUI(); renderStudyCard(); saveProgress(); }
async function reviewAgain() {
  const d = await loadData();
  const allWords = d.words[activeDeckId] || [];
  studyQueue = shuffle(allWords.filter(w => againSet.has(w.id)));
  studyIdx=0; flipped=false; knowSet.clear(); againSet.clear();
  updateStudyUI(); renderStudyCard();
}
document.addEventListener("keydown", e => {
  if (currentPage !== "study") return;
  if (e.code==="Space") { e.preventDefault(); flipCard(); }
  if (e.code==="ArrowRight" && flipped) markKnow();
  if (e.code==="ArrowLeft"  && flipped) markAgain();
});

// BACKUP & RESTORE
async function exportBackup() {
  const d = await loadData();
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    data: d
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `flashcard-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  // Save last backup time
  localStorage.setItem("lastBackup", new Date().toISOString());
  updateBackupInfo();
  showToast("✓ Đã xuất file backup!");
}

function importBackup(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const backup = JSON.parse(ev.target.result);
      // Support both raw data and wrapped backup format
      const d = backup.data || backup;
      if (!d.decks || !d.words) throw new Error("File không hợp lệ");
      const totalWords = Object.values(d.words).reduce((s, arr) => s + arr.length, 0);
      const msg = `Tìm thấy ${d.decks.length} bộ thẻ và ${totalWords} từ vựng.\n\nDữ liệu hiện tại sẽ bị GHI ĐÈ. Bạn có chắc không?`;
      if (!confirm(msg)) return;
      await saveData(d);
      renderManage();
      showToast("✓ Nhập backup thành công!");
    } catch(err) {
      alert("File backup không hợp lệ hoặc bị lỗi!\n" + err.message);
    }
    document.getElementById("importFile").value = "";
  };
  reader.readAsText(file);
}

function updateBackupInfo() {
  const el = document.getElementById("backupInfo");
  if (!el) return;
  const last = localStorage.getItem("lastBackup");
  if (last) {
    const d = new Date(last);
    const str = d.toLocaleDateString("vi-VN") + " lúc " + d.toLocaleTimeString("vi-VN", {hour:"2-digit",minute:"2-digit"});
    el.textContent = "⚠️ Nên backup thường xuyên để tránh mất dữ liệu. Lần cuối: " + str;
  } else {
    el.textContent = "⚠️ Chưa backup lần nào — nhấn Xuất file backup để lưu an toàn!";
  }
}

// INIT
(async () => { await seedDefault(); renderHome(); })();
</script>
